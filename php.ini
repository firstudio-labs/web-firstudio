; PHP Configuration for AI Development
; Place this file in your PHP installation directory or use with php -c

; Increase POST and upload limits
post_max_size = 32M
upload_max_filesize = 32M
max_input_vars = 3000

; Increase execution time and memory
max_execution_time = 300
memory_limit = 512M

; Increase input time
max_input_time = 300

; Enable error reporting for development
display_errors = On
error_reporting = E_ALL

; Session settings
session.gc_maxlifetime = 3600
session.cookie_lifetime = 0
